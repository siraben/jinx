<svg xmlns="http://www.w3.org/2000/svg" width="720" height="350" viewBox="0 0 720 350" font-family="-apple-system,Segoe UI,Roboto,sans-serif" role="img" aria-labelledby="chart-title chart-description">
<title id="chart-title">jinx speedup vs C++ Nix (higher is better)</title>
<desc id="chart-description">Jinx speedup over C++ Nix across parser, compute, and realistic nixpkgs evaluations.</desc>
<rect width="720" height="350" fill="#ffffff"/>
<text x="360.0" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a2e">jinx speedup vs C++ Nix (higher is better)</text>
