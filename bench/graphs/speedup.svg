<text x="296.2" y="58.0" text-anchor="middle" font-size="11" font-weight="400" fill="#6b7280">1× (parity)</text>
<text x="238.0" y="94.0" text-anchor="end" font-size="12.5" font-weight="400" fill="#1a1a2e">parse all-packages.nix</text>
